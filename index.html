<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <meta name="robots" content="max-image-preview:large" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Remove these meta tags as they will be handled by Helmet -->
  <title>Sownmark</title>

  <!-- DNS Prefetch for External Domains -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="dns-prefetch" href="https://connect.facebook.net" />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

  <!-- Preconnect for Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Non-Blocking Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet" />
  </noscript>

  <!-- Preload Critical Assets -->
  <link rel="preload" as="image" href="/logo.webp" />
  <link rel="preload" as="image" href="/hero.webp" fetchpriority="high" media="(min-width: 1024px)" />

  <!-- Basic meta tags -->
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Sownmark" />
  <meta property="og:site_name" content="Sownmark" />
  <meta property="og:image" content="https://sownmark.com/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://sownmark.com/og-image.jpg" />

</head>

<body>
  <!-- Meta Pixel Fallback for NoScript -->
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1486668442357854&ev=PageView&noscript=1" />
  </noscript>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <!-- Delayed Third-Party Scripts (4s Delay to unblock LCP/FCP) -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        // 1. Google AdSense
        var adsense = document.createElement('script');
        adsense.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8506322018386318";
        adsense.async = true;
        adsense.crossOrigin = "anonymous";
        document.body.appendChild(adsense);

        // 2. Google Tag Manager (gtag)
        var gtm = document.createElement('script');
        gtm.src = "https://www.googletagmanager.com/gtag/js?id=AW-17005532217";
        gtm.async = true;
        document.body.appendChild(gtm);

        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'AW-17005532217');

        // 3. Facebook Pixel
        !function (f, b, e, v, n, t, s) {
          if (f.fbq) return; n = f.fbq = function () {
            n.callMethod ?
            n.callMethod.apply(n, arguments) : n.queue.push(arguments)
          }; if (!f._fbq) f._fbq = n;
          n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = []; t = b.createElement(e); t.async = !0;
          t.src = v; s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s)
        }(window,
          document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1486668442357854');
        fbq('track', 'PageView');
      }, 4000);
    });
  </script>
</body>

</html>
